<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="base.css" />
</head>
<body>
  <div class="status-bar">
    <span>9:43</span>
    <span class="status-icons"><i class="ph ph-cell-signal-full"></i><i class="ph ph-wifi-high"></i><i class="ph ph-battery-full"></i></span>
  </div>
  <div class="screen">
    <div class="header">
      <div class="header-left">
        <i class="ph-duotone ph-clipboard-text"></i>
        <span class="title">முடிந்தது! 🎉</span>
      </div>
    </div>

    <div class="organize-btn">
      <i class="ph-fill ph-magic-wand"></i>
      <span>வகைப்படுத்தி விலை காட்டு</span>
    </div>

    <div class="item-card">
      <div class="item-row"><span class="item-name">தக்காளி</span><span class="item-qty">2 kg</span></div>
      <div class="item-row"><span class="item-name">பால்</span><span class="item-qty">1 Lit</span></div>
      <div class="item-row"><span class="item-name">இட்லி அரிசி</span><span class="item-qty">2 kg</span></div>
      <div class="item-row"><span class="item-name">முட்டை</span><span class="item-qty">6</span></div>
    </div>

    <div style="flex:1"></div>

    <div class="share-row">
      <div class="share-btn"><i class="ph-duotone ph-file-plus" style="color:var(--sage)"></i></div>
      <div class="share-btn"><i class="ph-duotone ph-whatsapp-logo" style="color:var(--blue)"></i></div>
      <div class="share-btn"><i class="ph-duotone ph-share-network" style="color:var(--berry)"></i></div>
    </div>
  </div>
</body>
</html>
