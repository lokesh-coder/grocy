<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="base.css" />
</head>
<body>
  <div class="status-bar">
    <span>9:42</span>
    <span class="status-icons"><i class="ph ph-cell-signal-full"></i><i class="ph ph-wifi-high"></i><i class="ph ph-battery-full"></i></span>
  </div>
  <div class="screen">
    <div class="header">
      <div class="header-left">
        <i class="ph-duotone ph-shopping-bag"></i>
        <span class="title">மளிகை பட்டியல்</span>
      </div>
      <div class="header-right">
        <div class="icon-square"><i class="ph ph-question"></i></div>
        <div class="icon-square"><i class="ph ph-gear"></i></div>
      </div>
    </div>

    <div class="segments">
      <div class="segment">இரண்டு கிலோ தக்காளி வேணும்</div>
      <div class="segment">ஒரு லிட்டர் பால்</div>
      <div class="segment">இட்லி அரிசி இரண்டு கிலோ</div>
      <div class="segment">ஆறு முட்டை</div>
    </div>

    <div class="controls">
      <div class="mic recording"><i class="ph-fill ph-stop"></i></div>
      <div class="done-btn"><i class="ph-fill ph-seal-check"></i></div>
    </div>
  </div>
</body>
</html>
