<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="base.css" />
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
    <span class="status-icons"><i class="ph ph-cell-signal-full"></i><i class="ph ph-wifi-high"></i><i class="ph ph-battery-full"></i></span>
  </div>
  <div class="screen">
    <div class="header">
      <div class="header-left">
        <i class="ph-duotone ph-shopping-bag"></i>
        <span class="title">மளிகை பட்டியல்</span>
      </div>
      <div class="header-right">
        <div class="icon-square"><i class="ph ph-question"></i></div>
        <div class="icon-square attention"><i class="ph ph-gear"></i></div>
      </div>
    </div>

    <div class="empty">
      <i class="ph ph-basket"></i>
      <div class="placeholder">பேசும்போது உங்கள் வார்த்தைகள் இங்கே தோன்றும்.</div>
      <div class="chips">
        <div class="chip">தக்காளி</div>
        <div class="chip">பால்</div>
        <div class="chip">இட்லி அரிசி</div>
        <div class="chip">ஆப்பிள்</div>
      </div>
      <div class="last-list"><i class="ph ph-clock"></i> கடைசி பட்டியலைப் பார்</div>
    </div>

    <div class="controls">
      <div class="mic"><i class="ph-fill ph-microphone"></i></div>
    </div>
  </div>
</body>
</html>
